<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geometry Dash - Stereo Madness</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Russo+One&family=Orbitron:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    user-select: none;
    -webkit-user-select: none;
  }

  #gameCanvas {
    display: block;
    image-rendering: pixelated;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
  }

  #attemptText {
    position: fixed;
    top: 16px; left: 20px;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }

  #percentText {
    position: fixed;
    top: 16px; right: 20px;
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 0 10px rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }

  #progressBar {
    position: fixed;
    bottom: 0; left: 0;
    height: 6px;
    background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00);
    transition: width 0.05s linear;
    box-shadow: 0 0 12px rgba(0,255,255,0.8);
  }

  #menuScreen {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, #1a0533 0%, #0a0015 60%, #000 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    overflow: hidden;
  }

  #menuScreen .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  #menuTitle {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(36px, 8vw, 80px);
    color: #fff;
    text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff, 0 0 90px #7700ff;
    letter-spacing: 4px;
    margin-bottom: 8px;
    animation: titlePulse 2s ease-in-out infinite;
  }

  @keyframes titlePulse {
    0%, 100% { text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff, 0 0 90px #7700ff; }
    50% { text-shadow: 0 0 50px #00ffff, 0 0 100px #00ffff, 0 0 150px #0077ff; }
  }

  #menuSubtitle {
    font-family: 'Orbitron', monospace;
    font-size: clamp(12px, 3vw, 22px);
    color: #ffcc00;
    text-shadow: 0 0 15px #ffaa00;
    letter-spacing: 6px;
    margin-bottom: 50px;
    animation: subtitleGlow 1.5s ease-in-out infinite alternate;
  }

  @keyframes subtitleGlow {
    from { opacity: 0.7; }
    to { opacity: 1; }
  }

  .levelCard {
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 24px 40px;
    margin-bottom: 20px;
    cursor: pointer;
    pointer-events: all;
    transition: all 0.2s;
    width: min(420px, 90vw);
    display: flex;
    align-items: center;
    gap: 20px;
    backdrop-filter: blur(10px);
  }

  .levelCard:hover {
    background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.06) 100%);
    border-color: rgba(255,255,255,0.4);
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 12px 40px rgba(0,0,0,0.4);
  }

  .levelIcon {
    width: 60px;
    height: 60px;
    border-radius: 12px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }

  .levelInfo { flex: 1; }
  .levelName {
    font-family: 'Russo One', sans-serif;
    font-size: 20px;
    color: #fff;
    margin-bottom: 4px;
  }

  .levelMeta {
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
    display: flex;
    gap: 16px;
  }

  .diffDot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }

  .bestText {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    text-align: right;
  }

  #playBtn {
    font-family: 'Russo One', sans-serif;
    font-size: 22px;
    color: #000;
    background: linear-gradient(135deg, #ffdd00 0%, #ff9900 100%);
    border: none;
    border-radius: 50px;
    padding: 16px 60px;
    cursor: pointer;
    pointer-events: all;
    letter-spacing: 3px;
    box-shadow: 0 6px 30px rgba(255,200,0,0.5);
    transition: all 0.15s;
    margin-top: 10px;
  }

  #playBtn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 40px rgba(255,200,0,0.7);
  }

  #playBtn:active { transform: scale(0.97); }

  #deathScreen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 50;
    background: rgba(0,0,0,0.0);
  }

  #deathScreen.visible { display: flex; }

  .deathTitle {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(48px, 10vw, 100px);
    color: #fff;
    text-shadow: 0 0 40px rgba(255,60,60,1), 0 0 80px rgba(255,0,0,0.6);
    animation: deathShake 0.3s ease-out;
    margin-bottom: 16px;
  }

  @keyframes deathShake {
    0% { transform: scale(1.4) rotate(-3deg); }
    50% { transform: scale(1.1) rotate(2deg); }
    100% { transform: scale(1) rotate(0deg); }
  }

  .deathPercent {
    font-family: 'Orbitron', monospace;
    font-size: 24px;
    color: #ffcc00;
    letter-spacing: 4px;
    margin-bottom: 30px;
  }

  #winScreen {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 50;
    background: rgba(0,0,0,0.0);
  }

  #winScreen.visible { display: flex; }

  .winTitle {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(40px, 9vw, 90px);
    color: #fff;
    text-shadow: 0 0 40px #00ffaa, 0 0 80px #00ff77;
    animation: winBounce 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    margin-bottom: 12px;
  }

  @keyframes winBounce {
    0% { transform: scale(0.3) translateY(-100px); opacity: 0; }
    70% { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); }
  }

  .winStars {
    font-size: 50px;
    margin-bottom: 20px;
    animation: winStarSpin 1s ease-out;
  }

  @keyframes winStarSpin {
    0% { transform: rotate(-180deg) scale(0); opacity: 0; }
    100% { transform: rotate(0deg) scale(1); opacity: 1; }
  }

  .restartHint {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 3px;
    margin-top: 20px;
    animation: blinkHint 1.5s ease-in-out infinite;
  }

  @keyframes blinkHint {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.8; }
  }

  #practiceMode {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 3px;
    display: none;
  }

  #fpsCounter {
    position: fixed;
    bottom: 20px;
    right: 20px;
    font-size: 10px;
    color: rgba(255,255,255,0.25);
    letter-spacing: 1px;
  }

  #controlsHint {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    letter-spacing: 2px;
    white-space: nowrap;
  }

  #musicBar {
    position: fixed;
    top: 50px;
    left: 20px;
    display: flex;
    gap: 3px;
    align-items: flex-end;
    height: 20px;
  }

  .musicBarItem {
    width: 3px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
    animation: musicBounce var(--d) ease-in-out infinite alternate;
  }

  @keyframes musicBounce {
    from { height: 4px; }
    to { height: var(--h); }
  }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div id="attemptText">ATTEMPT 1</div>
  <div id="percentText">0%</div>
  <div id="progressBar" style="width:0%"></div>
  <div id="practiceMode">PRACTICE MODE</div>
  <div id="fpsCounter">60 FPS</div>
  <div id="controlsHint">CLICK / SPACE / UP ARROW TO JUMP</div>
</div>

<div id="musicBar">
  <div class="musicBarItem" style="--d:0.4s;--h:14px"></div>
  <div class="musicBarItem" style="--d:0.6s;--h:18px"></div>
  <div class="musicBarItem" style="--d:0.35s;--h:10px"></div>
  <div class="musicBarItem" style="--d:0.5s;--h:20px"></div>
  <div class="musicBarItem" style="--d:0.45s;--h:12px"></div>
</div>

<div id="menuScreen">
  <canvas class="stars" id="starCanvas"></canvas>
  <div id="menuTitle">GEOMETRY DASH</div>
  <div id="menuSubtitle">STEREO MADNESS</div>

  <div class="levelCard" id="level1Card" onclick="startGame(0)">
    <div class="levelIcon" style="background: linear-gradient(135deg, #ff4400, #ff8800);">🔥</div>
    <div class="levelInfo">
      <div class="levelName">Stereo Madness</div>
      <div class="levelMeta">
        <span><span class="diffDot" style="background:#ff4444"></span>EASY</span>
        <span>★ 1</span>
        <span>2:10</span>
      </div>
    </div>
    <div class="bestText">BEST: 0%</div>
  </div>

  <div class="levelCard" id="level2Card" onclick="startGame(1)">
    <div class="levelIcon" style="background: linear-gradient(135deg, #0088ff, #00ddff);">⚡</div>
    <div class="levelInfo">
      <div class="levelName">Back On Track</div>
      <div class="levelMeta">
        <span><span class="diffDot" style="background:#ffaa00"></span>NORMAL</span>
        <span>★ 2</span>
        <span>2:00</span>
      </div>
    </div>
    <div class="bestText">BEST: 0%</div>
  </div>

  <div class="levelCard" id="level3Card" onclick="startGame(2)">
    <div class="levelIcon" style="background: linear-gradient(135deg, #aa00ff, #ff00cc);">💎</div>
    <div class="levelInfo">
      <div class="levelName">Polargeist</div>
      <div class="levelMeta">
        <span><span class="diffDot" style="background:#00aaff"></span>HARD</span>
        <span>★ 3</span>
        <span>2:20</span>
      </div>
    </div>
    <div class="bestText">BEST: 0%</div>
  </div>

  <button id="playBtn" onclick="startGame(0)">▶ PLAY</button>
</div>

<div id="deathScreen">
  <div class="deathTitle">YOU DIED</div>
  <div class="deathPercent" id="deathPercent">0%</div>
  <div class="restartHint">CLICK TO RETRY</div>
</div>

<div id="winScreen">
  <div class="winStars">⭐⭐⭐</div>
  <div class="winTitle">LEVEL COMPLETE!</div>
  <div style="font-family:'Orbitron',monospace; font-size:16px; color:#ffcc00; letter-spacing:3px;">100%</div>
  <div class="restartHint">CLICK TO CONTINUE</div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const menuScreen = document.getElementById('menuScreen');
const deathScreen = document.getElementById('deathScreen');
const winScreen = document.getElementById('winScreen');
const attemptText = document.getElementById('attemptText');
const percentText = document.getElementById('percentText');
const progressBar = document.getElementById('progressBar');
const deathPercentEl = document.getElementById('deathPercent');
const fpsCounter = document.getElementById('fpsCounter');
const starCanvas = document.getElementById('starCanvas');
const starCtx = starCanvas.getContext('2d');

// ─── RESIZE ───────────────────────────────────────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); if (!gameRunning) drawMenu(); });

// ─── CONSTANTS ────────────────────────────────────────────────────────────────
const GRAVITY = 0.65;
const JUMP_FORCE = -13.5;
const PLAYER_SIZE = 40;
const GROUND_Y_RATIO = 0.72;
const TILE = 40;
const COLORS = {
  sky1: ['#1a0040','#000d2e','#00041a'],
  sky2: ['#001a3a','#001428','#000c1a'],
  sky3: ['#0d001a','#1a0030','#000820'],
  ground: ['#1a1a2e','#16213e','#0f3460'],
  neon: ['#ff00ff','#00ffff','#ffff00','#ff4400','#00ff88'],
  player: ['#ff6600','#ffaa00','#ff3300'],
  spike: '#ff2200',
  portal: '#00ffff',
  orb: '#ffee00',
};

// ─── STAR FIELD (MENU) ───────────────────────────────────────────────────────
const stars = [];
for (let i = 0; i < 300; i++) {
  stars.push({
    x: Math.random(),
    y: Math.random(),
    r: Math.random() * 1.8 + 0.3,
    speed: Math.random() * 0.2 + 0.05,
    brightness: Math.random(),
    twinkleSpeed: Math.random() * 0.03 + 0.01,
    twinkleOffset: Math.random() * Math.PI * 2,
  });
}

function drawStars(t) {
  starCtx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  const W = starCanvas.width, H = starCanvas.height;
  stars.forEach(s => {
    const alpha = 0.3 + 0.7 * (0.5 + 0.5 * Math.sin(t * s.twinkleSpeed + s.twinkleOffset));
    starCtx.beginPath();
    starCtx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
    starCtx.fillStyle = `rgba(255,255,255,${alpha})`;
    starCtx.fill();
    s.x -= s.speed * 0.0002;
    if (s.x < 0) { s.x = 1; s.y = Math.random(); }
  });
}

let menuAnimId = null;
let menuT = 0;
function animateMenu() {
  menuT++;
  drawStars(menuT);
  menuAnimId = requestAnimationFrame(animateMenu);
}
animateMenu();

// ─── LEVEL DEFINITIONS ───────────────────────────────────────────────────────
// Each obstacle: { type, x, y, w, h, color, variant }
// Types: 'block','spike','bigblock','platform','orb','portal_gravity','portal_size','sawblade','spring','ring','decor'

function buildLevel0() {
  const obs = [];
  const groundY = 0; // obstacles are placed relative to ground; actual y is computed in render

  // Helper: add spike cluster
  function spikes(startX, count, gap = 0) {
    for (let i = 0; i < count; i++) obs.push({ type:'spike', x: startX + i*(TILE+gap), y:0, color:'#ff3300' });
  }
  function block(x, y, w = TILE, h = TILE, color = '#4477ff') {
    obs.push({ type:'block', x, y, w, h, color });
  }
  function platform(x, y, w, color = '#00aaff') {
    obs.push({ type:'platform', x, y, w, h:12, color });
  }
  function orb(x, y, color = '#ffee00') {
    obs.push({ type:'orb', x, y, r:18, color });
  }
  function bigblock(x, y, w, h, color = '#5533ff') {
    obs.push({ type:'bigblock', x, y, w, h, color });
  }
  function sawblade(x, y) {
    obs.push({ type:'sawblade', x, y, r:24, color:'#ff4400' });
  }
  function ring(x, y) {
    obs.push({ type:'ring', x, y, r:20, color:'#ff00ff' });
  }
  function portalGrav(x) {
    obs.push({ type:'portal_gravity', x, y:0, w:50, h:180, flipped: true, color:'#ff00ff' });
  }
  function portalGravNormal(x) {
    obs.push({ type:'portal_gravity', x, y:0, w:50, h:180, flipped: false, color:'#00ffff' });
  }
  function portalMini(x) {
    obs.push({ type:'portal_size', x, y:0, w:50, h:180, mini:true, color:'#ffaa00' });
  }
  function portalNormal(x) {
    obs.push({ type:'portal_size', x, y:0, w:50, h:180, mini:false, color:'#00ff88' });
  }

  // --- SECTION 1: Tutorial intro (400-1400px) ---
  // Easy single spikes
  spikes(450, 1);
  spikes(600, 1);
  spikes(800, 1);
  // Small staircase up
  block(1000, TILE, TILE, TILE, '#4466ff');
  block(1040, TILE*2, TILE, TILE*2, '#4466ff');
  block(1080, TILE*3, TILE, TILE*3, '#4466ff');
  spikes(1130, 2);
  block(1240, TILE, TILE, TILE, '#4466ff');
  spikes(1330, 1);

  // --- SECTION 2: First challenge (1400-2800px) ---
  spikes(1500, 2);
  block(1650, TILE, TILE*2, TILE*2, '#5544ff');
  spikes(1740, 1);
  spikes(1850, 3);
  block(2000, TILE, TILE, TILE*3, '#5544ff');
  block(2040, TILE*2, TILE, TILE*2, '#5544ff');
  block(2120, TILE, TILE, TILE, '#5544ff');
  spikes(2180, 1);
  spikes(2240, 2);
  spikes(2380, 1);
  platform(2460, TILE*3, TILE*4, '#00aaff');
  spikes(2520, 1);
  block(2600, TILE, TILE*3, TILE, '#3355ff');
  spikes(2660, 3);
  block(2780, TILE, TILE, TILE*4, '#3355ff');

  // --- SECTION 3: Orbs and platforms (2800-4200px) ---
  orb(2950, TILE*4);
  spikes(3050, 2);
  orb(3160, TILE*5);
  spikes(3280, 1);
  block(3400, TILE, TILE*2, TILE*2, '#5566ff');
  spikes(3460, 2);
  orb(3550, TILE*3);
  platform(3620, TILE*4, TILE*3, '#00ccff');
  spikes(3700, 1);
  orb(3820, TILE*4);
  spikes(3920, 2);
  block(4020, TILE, TILE*3, TILE*3, '#4455ff');
  spikes(4080, 1);
  orb(4160, TILE*4.5);

  // --- SECTION 4: Gravity portal! (4200-5600px) ---
  block(4260, TILE, TILE*2, TILE*2, '#4455ff');
  spikes(4320, 2);
  portalGrav(4420);
  // After gravity flip - spikes on ceiling
  obs.push({ type:'spike_ceil', x:4550, y:0, color:'#ff3300' });
  obs.push({ type:'spike_ceil', x:4630, y:0, color:'#ff3300' });
  block(4720, 0, TILE*2, TILE*2, '#4455ff'); // "ceiling block"
  obs.push({ type:'spike_ceil', x:4810, y:0, color:'#ff3300' });
  obs.push({ type:'spike_ceil', x:4850, y:0, color:'#ff3300' });
  block(4950, 0, TILE, TILE*3, '#4455ff');
  obs.push({ type:'spike_ceil', x:5050, y:0, color:'#ff3300' });
  orb(5150, TILE*3);
  portalGravNormal(5280);

  // --- SECTION 5: Back to normal, harder (5600-7000px) ---
  spikes(5400, 1);
  spikes(5460, 2);
  block(5580, TILE, TILE*3, TILE, '#6644ff');
  block(5620, TILE*2, TILE, TILE*2, '#6644ff');
  spikes(5680, 1);
  sawblade(5800, TILE*0.5);
  block(5880, TILE, TILE*2, TILE*3, '#6644ff');
  spikes(5940, 2);
  sawblade(6080, TILE*0.5);
  spikes(6160, 1);
  block(6280, TILE, TILE, TILE*4, '#6644ff');
  spikes(6340, 3);
  bigblock(6480, TILE, TILE*3, TILE, '#5544ff');
  spikes(6540, 1);
  orb(6660, TILE*4);
  sawblade(6780, TILE*0.5);
  spikes(6880, 2);
  block(6960, TILE*2, TILE, TILE*2, '#7744ff');

  // --- SECTION 6: Mini portal section (7000-8400px) ---
  portalMini(7080);
  // Mini player section - smaller obstacles
  for (let i = 0; i < 5; i++) {
    obs.push({ type:'spike_mini', x:7240+i*80, y:0, color:'#ff4400' });
  }
  block(7700, TILE*0.5, TILE*0.5, TILE*0.5, '#4466ff');
  block(7800, TILE, TILE*0.5, TILE*1.5, '#4466ff');
  for (let i = 0; i < 3; i++) {
    obs.push({ type:'spike_mini', x:7900+i*60, y:0, color:'#ff4400' });
  }
  portalNormal(8080);

  // --- SECTION 7: Ship mode teaser + hard spikes (8400-10000px) ---
  spikes(8240, 1);
  spikes(8340, 3);
  ring(8480, TILE*4);
  block(8560, TILE, TILE*2, TILE*4, '#7755ff');
  spikes(8620, 2);
  ring(8740, TILE*3.5);
  spikes(8840, 1);
  block(8960, TILE*3, TILE, TILE, '#7755ff');
  block(9000, TILE*2, TILE, TILE*2, '#7755ff');
  block(9040, TILE, TILE, TILE*3, '#7755ff');
  spikes(9100, 1);
  spikes(9200, 2);
  sawblade(9320, TILE*0.5);
  sawblade(9360, TILE*0.5);
  spikes(9440, 3);
  block(9580, TILE, TILE*3, TILE*2, '#8844ff');
  spikes(9640, 1);
  orb(9760, TILE*4);
  spikes(9860, 2);
  block(9960, TILE*2, TILE, TILE*3, '#8844ff');

  // --- SECTION 8: Climax (10000-12000px) ---
  spikes(10100, 1);
  spikes(10200, 4);
  bigblock(10380, TILE, TILE*4, TILE, '#9933ff');
  spikes(10440, 1);
  sawblade(10560, TILE*0.5);
  block(10660, TILE, TILE*3, TILE*3, '#9933ff');
  spikes(10720, 2);
  orb(10840, TILE*4);
  spikes(10920, 1);
  spikes(11020, 3);
  ring(11140, TILE*4);
  block(11260, TILE, TILE*4, TILE, '#aa22ff');
  spikes(11320, 2);

function buildLevel1() {
  const obs = [];
  function block(x,y,w=TILE,h=TILE,c='#0088ff'){obs.push({type:'block',x,y,w,h,color:c});}
  function spikes(x,n,g=0){for(let i=0;i<n;i++)obs.push({type:'spike',x:x+i*(TILE+g),y:0,color:'#ff4400'});}
  function orb(x,y,c='#ffee00'){obs.push({type:'orb',x,y,r:18,color:c});}
  function saw(x,y){obs.push({type:'sawblade',x,y,r:24,color:'#ff2200'});}

  for(let i=0;i<80;i++){
    const t = i * 160;
    const r = Math.random();
    if(r < 0.35) spikes(t+400, Math.floor(Math.random()*3)+1);
    else if(r < 0.6) block(t+400, TILE, TILE*(1+Math.floor(Math.random()*3)), TILE*(1+Math.floor(Math.random()*3)), '#0066dd');
    else if(r < 0.75) orb(t+400, TILE*(3+Math.random()*2));
    else if(r < 0.88) saw(t+400, TILE*0.5);
    else { spikes(t+400,1); spikes(t+440+TILE,1); }
  }
  obs.push({type:'win',x:13400,y:0,w:60,h:999});
  return obs;
}

function buildLevel2() {
  const obs = [];
  function block(x,y,w=TILE,h=TILE,c='#aa00ff'){obs.push({type:'block',x,y,w,h,color:c});}
  function spikes(x,n){for(let i=0;i<n;i++)obs.push({type:'spike',x:x+i*TILE,y:0,color:'#ff0066'});}
  function orb(x,y){obs.push({type:'orb',x,y,r:18,color:'#ff00ff'});}
  function saw(x,y){obs.push({type:'sawblade',x,y,r:24,color:'#ff0088'});}
  function ring(x,y){obs.push({type:'ring',x,y,r:20,color:'#aa00ff'});}

  // Hard level - more densely packed
  for(let i=0;i<100;i++){
    const t = i * 130;
    const r = Math.random();
    if(r < 0.4) spikes(t+400, Math.floor(Math.random()*4)+1);
    else if(r < 0.6) { block(t+400, TILE, TILE*(1+Math.floor(Math.random()*4)), TILE*(1+Math.floor(Math.random()*4)), '#880099'); }
    else if(r < 0.72) orb(t+400, TILE*(3+Math.random()*3));
    else if(r < 0.84) saw(t+400, TILE*0.5);
    else ring(t+400, TILE*(3.5+Math.random()*2));
  }
  obs.push({type:'win',x:14200,y:0,w:60,h:999});
  return obs;
}

// ─── PARTICLES ───────────────────────────────────────────────────────────────
function spawnTrail() {
  player.trailParticles.push({
    x: player.x + player.size/2,
    y: player.y + player.size/2,
    vx: (Math.random() - 0.5) * 3 - scrollSpeed * 0.3,
    vy: (Math.random() - 0.5) * 3,
    alpha: 0.8,
    size: Math.random() * 8 + 3,
    color: level.bgGlow,
    life: 1,
  });
}

function spawnDeathParticles() {
  for (let i = 0; i < 40; i++) {
    const angle = (Math.PI * 2 * i) / 40;
    const speed = Math.random() * 8 + 3;
    player.deathParticles.push({
      x: player.x + player.size/2,
      y: player.y + player.size/2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 4,
      alpha: 1,
      size: Math.random() * 10 + 4,
      color: i % 3 === 0 ? '#ff6600' : i % 3 === 1 ? '#ffcc00' : '#ff0044',
      life: 1,
      gravity: 0.3,
    });
  }
}

function spawnJumpParticles() {
  for (let i = 0; i < 8; i++) {
    player.trailParticles.push({
      x: player.x + player.size/2 + (Math.random()-0.5)*20,
      y: player.y + player.size,
      vx: (Math.random()-0.5)*4,
      vy: Math.random()*-3 - 1,
      alpha: 0.9,
      size: Math.random()*6 + 2,
      color: level.groundLine,
      life: 1,
    });
  }
}

function updateParticles() {
  // Trail
  player.trailParticles = player.trailParticles.filter(p => p.alpha > 0.02);
  player.trailParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.alpha -= 0.04;
    p.size *= 0.95;
  });
  // Death
  player.deathParticles = player.deathParticles.filter(p => p.alpha > 0.01);
  player.deathParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity || 0;
    p.alpha -= 0.025;
    p.size *= 0.97;
  });
}

let jumpPressed = false;

function doJump() {
  if (!gameRunning || player.dead) return;
  if (gameOver || levelWon) {
    handleRestartClick();
    return;
  }
  if (player.onGround) {
    player.vy = player.gravityFlipped ? 13.5 : JUMP_FORCE;
    player.onGround = false;
    spawnJumpParticles();
  }
}

function handleRestartClick() {
  if (deathAnimating || (winAnimating && winTimer < 60)) return;
  if (levelWon) {
    winScreen.classList.remove('visible');
    menuScreen.style.display = 'flex';
    cancelAnimationFrame(animId);
    gameRunning = false;
    animateMenu();
    return;
  }
  if (gameOver) {
    deathScreen.classList.remove('visible');
    attempts++;
    attemptText.textContent = `ATTEMPT ${attempts}`;
    initLevel(currentLevelIdx);
    gameLoop();
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (!jumpHeld) doJump();
    jumpHeld = true;
  }
  if (e.code === 'Escape') {
    if (gameRunning) {
      cancelAnimationFrame(animId);
      gameRunning = false;
      deathScreen.classList.remove('visible');
      winScreen.classList.remove('visible');
      menuScreen.style.display = 'flex';
      animateMenu();
    }
  }
});

document.addEventListener('keyup', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    jumpHeld = false;
  }
});

canvas.addEventListener('pointerdown', e => {

});

}

// ─── COLLISION ────────────────────────────────────────────────────────────────
function rectOverlap(ax, ay, aw, ah, bx, by, bw, bh, margin = 4) {
  return ax + margin < bx + bw &&
         ax + aw - margin > bx &&
         ay + margin < by + bh &&
         ay + ah - margin > by;
}

function circleRect(cx, cy, cr, rx, ry, rw, rh, margin = 4) {
  const nearX = Math.max(rx, Math.min(cx, rx+rw));
  const nearY = Math.max(ry, Math.min(cy, ry+rh));
  const dx = cx - nearX, dy = cy - nearY;
  return dx*dx + dy*dy < (cr-margin)*(cr-margin);
}

function checkCollisions() {
  if (player.dead) return;
  const W = canvas.width, H = canvas.height;
  const gY = groundY;
  const ps = player.size;
  const px = player.x - camera.x;

  // Ground / ceiling collision
  if (!player.gravityFlipped) {
    if (player.y + ps >= gY) {
      player.y = gY - ps;
      player.vy = 0;
      player.onGround = true;
    }
    if (player.y < 0) { player.y = 0; player.vy = 0; }
  } else {
    if (player.y <= 0) {
      player.y = 0;
      player.vy = 0;
      player.onGround = true;
    }
    if (player.y + ps >= gY) { killPlayer(); return; }
  }

  // Screen left edge = death
  if (player.x - camera.x < -ps) { killPlayer(); return; }

  // Obstacles
  for (const ob of obstacles) {
    const ox = ob.x; // world x
    const screenX = ox - camera.x;
    if (screenX > W + 100 || screenX + (ob.w || 100) < -100) continue;

    const computedOy = computeObstacleY(ob, gY, ps);

    if (ob.type === 'spike' || ob.type === 'spike_mini') {
      // Triangle spike - use smaller hitbox
      const sw = ps * 0.7;
      const sh = ps * 0.7;
      const sx = ox + (TILE - sw) / 2;
      if (rectOverlap(player.x, player.y, ps, ps, sx, computedOy, sw, sh, 6)) {
        killPlayer(); return;
      }
    } else if (ob.type === 'spike_ceil') {
      const sw = ps * 0.7, sh = ps * 0.7;
      const sx = ox + (TILE - sw) / 2;
      const sy = 0;
      if (rectOverlap(player.x, player.y, ps, ps, sx, sy, sw, sh, 6)) {
        killPlayer(); return;
      }
    } else if (ob.type === 'block' || ob.type === 'bigblock') {
      const bx = ox, by = computedOy, bw = ob.w, bh = ob.h;
      if (rectOverlap(player.x, player.y, ps, ps, bx, by, bw, bh, 3)) {
        // Land on top?
        const playerBottom = player.y + ps;
        const playerPrevBottom = playerBottom - player.vy;
        if (!player.gravityFlipped && playerPrevBottom <= by + 8 && player.vy > 0) {
          player.y = by - ps;
          player.vy = 0;
          player.onGround = true;
        } else {
          killPlayer(); return;
        }
      }
    } else if (ob.type === 'platform') {
      const bx = ox, by = computedOy, bw = ob.w, bh = ob.h;
      // One-way platform (land on top only)
      const playerBottom = player.y + ps;
      const prevBottom = playerBottom - player.vy;
      if (player.vy > 0 && prevBottom <= by + 4 &&
          player.x + ps > bx && player.x < bx + bw &&
          playerBottom >= by && playerBottom <= by + bh + 8) {
        player.y = by - ps;
        player.vy = 0;
        player.onGround = true;
      }
    } else if (ob.type === 'orb') {
      const cx = ox + TILE/2, cy = computedOy;
      const dx = (player.x + ps/2) - cx;
      const dy = (player.y + ps/2) - cy;
      if (Math.sqrt(dx*dx+dy*dy) < ob.r + ps/2 - 6) {
        if (jumpHeld || jumpPressed) {
          player.vy = player.gravityFlipped ? 13.5 : JUMP_FORCE * 1.1;
          player.onGround = false;
          spawnJumpParticles();
        }
      }
    } else if (ob.type === 'ring') {
      const cx = ox + TILE/2, cy = computedOy;
      const dx = (player.x + ps/2) - cx;
      const dy = (player.y + ps/2) - cy;
      if (Math.sqrt(dx*dx+dy*dy) < ob.r + ps/2 - 4) {
        player.vy = player.gravityFlipped ? 13.5 : JUMP_FORCE;
        player.onGround = false;
        spawnJumpParticles();
      }
    } else if (ob.type === 'sawblade') {
      const cx = ox + TILE/2, cy = computedOy;
      const dx = (player.x + ps/2) - cx;
      const dy = (player.y + ps/2) - cy;
      if (Math.sqrt(dx*dx+dy*dy) < ob.r + ps/2 - 8) {
        killPlayer(); return;
      }
    } else if (ob.type === 'portal_gravity') {
      if (rectOverlap(player.x, player.y, ps, ps, ox, 0, ob.w, H, 0)) {
        player.gravityFlipped = ob.flipped;
      }
    } else if (ob.type === 'portal_size') {
      if (rectOverlap(player.x, player.y, ps, ps, ox, 0, ob.w, H, 0)) {
        player.mini = ob.mini;
        player.size = ob.mini ? PLAYER_SIZE * 0.6 : PLAYER_SIZE;
      }
    } else if (ob.type === 'win') {
      if (player.x + ps > ox) { handleWin(); return; }
    }
  }

  jumpPressed = false;
}

function computeObstacleY(ob, gY, ps) {
  if (ob.type === 'orb' || ob.type === 'ring') {
    return gY - ob.y - ob.r;
  }
  if (ob.type === 'sawblade') {
    return gY - ob.y - ob.r;
  }
  if (ob.type === 'block' || ob.type === 'bigblock' || ob.type === 'platform') {
    return gY - ob.y - ob.h;
  }
  if (ob.type === 'spike' || ob.type === 'spike_mini') {
    return gY - TILE;
  }
  return gY - TILE;
}

// ─── KILL ─────────────────────────────────────────────────────────────────────
function killPlayer() {
  if (player.dead) return;
  player.dead = true;
  gameOver = true;
  spawnDeathParticles();
  const pct = Math.floor((camera.x / (level.totalLength - canvas.width)) * 100);
  const clampedPct = Math.max(0, Math.min(100, pct));
  bestPercent[currentLevelIdx] = Math.max(bestPercent[currentLevelIdx], clampedPct);

  deathPercentEl.textContent = `${clampedPct}%`;
  deathTimer = 0;
  deathAnimating = true;

  // Update best on menu cards
  const cards = ['level1Card','level2Card','level3Card'];
  const card = document.getElementById(cards[currentLevelIdx]);
  if (card) card.querySelector('.bestText').textContent = `BEST: ${bestPercent[currentLevelIdx]}%`;
}

function handleWin() {
  if (levelWon) return;
  levelWon = true;
  winTimer = 0;
  winAnimating = true;
  bestPercent[currentLevelIdx] = 100;
  const cards = ['level1Card','level2Card','level3Card'];
  const card = document.getElementById(cards[currentLevelIdx]);
  if (card) card.querySelector('.bestText').textContent = `BEST: 100%`;
}

// ─── DRAW HELPERS ─────────────────────────────────────────────────────────────
function drawRoundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

function drawGlowRect(x, y, w, h, color, glowSize = 12) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = glowSize;
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
  ctx.restore();
}

function drawGlowCircle(x, y, r, color, glowSize = 15) {
  ctx.save();
  ctx.shadowColor = color;
  ctx.shadowBlur = glowSize;
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = color;
  ctx.fill();
  ctx.restore();
}

// ─── DRAW BACKGROUND ──────────────────────────────────────────────────────────
function drawBackground() {
  const W = canvas.width, H = canvas.height;
  const gY = groundY;
  const cfg = level;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, gY);
  skyGrad.addColorStop(0, cfg.skyColors[0]);
  skyGrad.addColorStop(0.5, cfg.skyColors[1]);
  skyGrad.addColorStop(1, cfg.skyColors[2]);
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, gY);

  // Ground
  const groundGrad = ctx.createLinearGradient(0, gY, 0, H);
  groundGrad.addColorStop(0, cfg.groundColor);
  groundGrad.addColorStop(1, '#000000');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, gY, W, H - gY);

  // Background grid lines (parallax)
  const parallaxX = camera.x * 0.2;
  ctx.strokeStyle = cfg.gridColor;
  ctx.lineWidth = 0.5;

  // Vertical lines
  const vSpacing = 80;
  const startVX = -(parallaxX % vSpacing);
  for (let x = startVX; x < W; x += vSpacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, gY);
    ctx.stroke();
  }
  // Horizontal lines
  for (let y = 0; y < gY; y += 60) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }

  // Background decorative shapes (parallax layer 1)
  const pl1 = camera.x * 0.15;
  bgShapes.forEach(s => {
    const sx = s.x - pl1;
    const sy = s.y * gY;
    if (sx < -200 || sx > W + 200) return;
    ctx.globalAlpha = s.alpha;
    ctx.fillStyle = s.color;
    if (s.type === 'rect') {
      ctx.fillRect(sx, sy, s.w, s.h);
    } else {
      ctx.beginPath();
      ctx.moveTo(sx, sy + s.h);
      ctx.lineTo(sx + s.w/2, sy);
      ctx.lineTo(sx + s.w, sy + s.h);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });

  // Ground glow line
  ctx.shadowColor = cfg.groundLine;
  ctx.shadowBlur = 20;
  ctx.strokeStyle = cfg.groundLine;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, gY);
  ctx.lineTo(W, gY);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Ground pattern lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  const gLineSpacing = 12;
  const camXGround = camera.x * 0.8;
  for (let gx = -(camXGround % 40); gx < W; gx += 40) {
    ctx.beginPath();
    ctx.moveTo(gx, gY);
    ctx.lineTo(gx, H);
    ctx.stroke();
  }
}

// ─── DRAW OBSTACLES ──────────────────────────────────────────────────────────
function drawObstacles() {
  const W = canvas.width;
  const gY = groundY;
  const ps = player.size;

  obstacles.forEach(ob => {
    const sx = ob.x - camera.x;
    if (sx > W + 200 || sx + (ob.w || TILE*2) < -200) return;

    if (ob.type === 'block' || ob.type === 'bigblock') {
      const oy = computeObstacleY(ob, gY, ps);
      // Main block
      ctx.save();
      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 8;
      ctx.fillStyle = ob.color;
      drawRoundedRect(sx, oy, ob.w, ob.h, 3);
      ctx.fill();
      // Highlight
      ctx.shadowBlur = 0;
      ctx.fillStyle = 'rgba(255,255,255,0.12)';
      ctx.fillRect(sx + 3, oy + 3, ob.w - 6, 6);
      // Inner pattern
      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      for (let gx = sx + 8; gx < sx + ob.w - 4; gx += 16) {
        ctx.beginPath(); ctx.moveTo(gx, oy + 4); ctx.lineTo(gx, oy + ob.h - 4); ctx.stroke();
      }
      ctx.restore();
    } else if (ob.type === 'spike' || ob.type === 'spike_mini') {
      const oy = gY;
      const sw = ob.type === 'spike_mini' ? TILE * 0.6 : TILE;
      ctx.save();
      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      ctx.moveTo(sx, oy);
      ctx.lineTo(sx + sw/2, oy - sw);
      ctx.lineTo(sx + sw, oy);
      ctx.closePath();
      ctx.fill();
      // White edge
      ctx.strokeStyle = 'rgba(255,180,150,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    } else if (ob.type === 'spike_ceil') {
      const sw = TILE;
      ctx.save();
      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 12;
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      ctx.moveTo(sx, 0);
      ctx.lineTo(sx + sw/2, sw);
      ctx.lineTo(sx + sw, 0);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,180,150,0.6)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    } else if (ob.type === 'platform') {
      const oy = computeObstacleY(ob, gY, ps);
      ctx.save();
      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 15;
      ctx.fillStyle = ob.color;
      ctx.fillRect(sx, oy, ob.w, ob.h);
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(sx, oy, ob.w, 2);
      ctx.restore();
    } else if (ob.type === 'orb') {
      const oy = computeObstacleY(ob, gY, ps);
      const pulse = 1 + 0.12 * Math.sin(Date.now() * 0.006 + ob.x * 0.01);
      ctx.save();
      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 25;
      // Outer glow ring
      ctx.strokeStyle = ob.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(sx + TILE/2, oy, ob.r * pulse * 1.4, 0, Math.PI*2);
      ctx.stroke();
      ctx.globalAlpha = 1;
      // Inner orb
      const orbGrad = ctx.createRadialGradient(sx+TILE/2-ob.r*0.3, oy-ob.r*0.3, 2, sx+TILE/2, oy, ob.r*pulse);
      orbGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
      orbGrad.addColorStop(0.4, ob.color);
      orbGrad.addColorStop(1, 'rgba(0,0,0,0.3)');
      ctx.fillStyle = orbGrad;
      ctx.beginPath();
      ctx.arc(sx + TILE/2, oy, ob.r * pulse, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (ob.type === 'ring') {
      const oy = computeObstacleY(ob, gY, ps);
      const pulse = 1 + 0.2 * Math.sin(Date.now() * 0.008 + ob.x * 0.01);
      ctx.save();
      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 20;
      ctx.strokeStyle = ob.color;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(sx + TILE/2, oy, ob.r * pulse, 0, Math.PI*2);
      ctx.stroke();
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.4;
      ctx.beginPath();
      ctx.arc(sx + TILE/2, oy, ob.r * pulse * 1.5, 0, Math.PI*2);
      ctx.stroke();
      ctx.restore();
    } else if (ob.type === 'sawblade') {
      const oy = computeObstacleY(ob, gY, ps);
      const cx = sx + TILE/2, cy = oy;
      sawAngle += 0.08;
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(sawAngle);
      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 18;
      // Draw saw teeth
      const teeth = 12;
      ctx.fillStyle = ob.color;
      ctx.beginPath();
      for (let i = 0; i < teeth; i++) {
        const a1 = (i/teeth)*Math.PI*2;
        const a2 = ((i+0.5)/teeth)*Math.PI*2;
        const a3 = ((i+1)/teeth)*Math.PI*2;
        if (i === 0) ctx.moveTo(Math.cos(a1)*ob.r, Math.sin(a1)*ob.r);
        ctx.lineTo(Math.cos(a2)*(ob.r+10), Math.sin(a2)*(ob.r+10));
        ctx.lineTo(Math.cos(a3)*ob.r, Math.sin(a3)*ob.r);
      }
      ctx.closePath();
      ctx.fill();
      // Center circle
      ctx.fillStyle = '#ff6600';
      ctx.beginPath();
      ctx.arc(0, 0, ob.r*0.4, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(0, 0, ob.r*0.18, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    } else if (ob.type === 'portal_gravity' || ob.type === 'portal_size') {
      const H = canvas.height;
      const pulse = 1 + 0.08 * Math.sin(Date.now()*0.005);
      ctx.save();
      ctx.globalAlpha = 0.8;
      ctx.strokeStyle = ob.color;
      ctx.lineWidth = 2;
      ctx.shadowColor = ob.color;
      ctx.shadowBlur = 20;
      // Outer portal frame
      ctx.strokeRect(sx, 30, ob.w, gY - 30);
      // Inner warp lines
      ctx.globalAlpha = 0.3;
      for (let i = 0; i < 8; i++) {
        const py = 30 + (gY - 30) * (i/8) + (Date.now()*0.05 % ((gY-30)/8));
        ctx.beginPath();
        ctx.moveTo(sx, py);
        ctx.lineTo(sx + ob.w, py);
        ctx.stroke();
      }
      // Icon
      ctx.globalAlpha = 0.9;
      ctx.fillStyle = ob.color;
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.fillText(ob.type === 'portal_gravity' ? (ob.flipped ? '↑' : '↓') : (ob.mini ? '▼' : '▲'), sx + ob.w/2, gY/2);
      ctx.restore();
    } else if (ob.type === 'win') {
      ctx.save();
      ctx.strokeStyle = '#00ffaa';
      ctx.lineWidth = 4;
      ctx.shadowColor = '#00ffaa';
      ctx.shadowBlur = 30;
      ctx.strokeRect(sx, 30, ob.w, gY - 30);
      ctx.fillStyle = 'rgba(0,255,170,0.1)';
      ctx.fillRect(sx, 30, ob.w, gY - 30);
      ctx.globalAlpha = 0.8 + 0.2*Math.sin(Date.now()*0.01);
      ctx.fillStyle = '#00ffaa';
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'center';
      ctx.fillText('END', sx + ob.w/2, gY/2);
      ctx.restore();
    }
  });
}

// ─── DRAW PLAYER ─────────────────────────────────────────────────────────────
function drawPlayer() {
  if (player.dead && player.deathParticles.length === 0) return;
  const ps = player.size;
  const px = player.x - camera.x;
  const py = player.y;

  // Death particles
  player.deathParticles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = p.color;
    const screenX = p.x - camera.x;
    ctx.beginPath();
    if (Math.random() < 0.5) {
      ctx.fillRect(screenX - p.size/2, p.y - p.size/2, p.size, p.size);
    } else {
      ctx.arc(screenX, p.y, p.size/2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });

  if (player.dead) return;

  // Trail particles
  player.trailParticles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha * 0.6;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.fillStyle = p.color;
    const screenX = p.x - camera.x;
    ctx.fillRect(screenX - p.size/2, p.y - p.size/2, p.size, p.size);
    ctx.restore();
  });

  ctx.save();
  ctx.translate(px + ps/2, py + ps/2);
  if (player.gravityFlipped) ctx.scale(1, -1);
  ctx.rotate(player.angle);

  // Outer glow
  ctx.shadowColor = COLORS.player[1];
  ctx.shadowBlur = 20;

  // Main player body
  const playerGrad = ctx.createLinearGradient(-ps/2, -ps/2, ps/2, ps/2);
  playerGrad.addColorStop(0, COLORS.player[0]);
  playerGrad.addColorStop(0.5, COLORS.player[1]);
  playerGrad.addColorStop(1, COLORS.player[2]);
  ctx.fillStyle = playerGrad;
  drawRoundedRect(-ps/2, -ps/2, ps, ps, 5);
  ctx.fill();

  // Inner decoration
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  const inner = ps * 0.5;
  drawRoundedRect(-inner/2, -inner/2, inner, inner, 3);
  ctx.fill();

  // Center dot
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.beginPath();
  ctx.arc(0, 0, ps * 0.1, 0, Math.PI*2);
  ctx.fill();

  // Corner dots
  const cd = ps * 0.35;
  [[-cd,-cd],[cd,-cd],[cd,cd],[-cd,cd]].forEach(([dx,dy]) => {
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(dx, dy, ps*0.07, 0, Math.PI*2);
    ctx.fill();
  });

  ctx.restore();
}

// ─── DRAW PARTICLES ───────────────────────────────────────────────────────────
function drawTrailParticles() {
  // Already drawn in drawPlayer
}

// ─── UPDATE ───────────────────────────────────────────────────────────────────
function update() {
  if (gameOver || levelWon) {
    updateParticles();
    if (deathAnimating) {
      deathTimer++;
      if (deathTimer === 20) deathScreen.classList.add('visible');
    }
    if (winAnimating) {
      winTimer++;
      if (winTimer === 30) winScreen.classList.add('visible');
    }
    return;
  }

  // Scroll
  camera.x += scrollSpeed;

  // Physics
  const gravDir = player.gravityFlipped ? -1 : 1;
  player.vy += GRAVITY * gravDir;

  // Terminal velocity
  player.vy = Math.max(Math.min(player.vy, 18), -18);

  player.y += player.vy;
  player.onGround = false;

  // Rotation
  if (!player.onGround) {
    player.angle += 0.1 * (player.vy > 0 ? 1 : -1);
  } else {
    // Snap to nearest 90 degrees
    const snap = Math.PI / 2;
    player.angle = Math.round(player.angle / snap) * snap;
  }

  checkCollisions();

  // Trail
  if (!player.dead && frameCount % 2 === 0) spawnTrail();
  updateParticles();

  // UI updates
  const pct = Math.floor((camera.x / (level.totalLength - canvas.width + 100)) * 100);
  const clampedPct = Math.max(0, Math.min(100, pct));
  percentText.textContent = `${clampedPct}%`;
  progressBar.style.width = clampedPct + '%';
}

// ─── DRAW FRAME ───────────────────────────────────────────────────────────────
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawObstacles();
  drawPlayer();

  // Death flash
  if (player.dead && deathTimer < 8) {
    ctx.fillStyle = `rgba(255,60,0,${0.4 * (1 - deathTimer/8)})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Win flash
  if (levelWon && winTimer < 15) {
    ctx.fillStyle = `rgba(0,255,170,${0.3 * (1 - winTimer/15)})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// ─── FPS ─────────────────────────────────────────────────────────────────────
function updateFps(now) {
  frameCount++;
  if (now - lastFpsTime > 1000) {
    fps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    fpsCounter.textContent = fps + ' FPS';
    frameCount = 0;
    lastFpsTime = now;
  }
}

// ─── GAME LOOP ───────────────────────────────────────────────────────────────
function gameLoop(now = 0) {
  update();
  draw();
  updateFps(now);
  animId = requestAnimationFrame(gameLoop);
}

// ─── MENU DRAW ───────────────────────────────────────────────────────────────
function drawMenu() {

}

canvas.style.display = 'block';
